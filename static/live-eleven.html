<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nila — ElevenLabs Live (EN)</title>
  <style>
    :root {
      --bg: #050810;
      --panel: #111827;
      --border: #1f2937;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --live: #e11d48;
      --on: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      font-family: system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #4c0519 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 1rem; flex: 1; }
    header input {
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    .badge {
      font-size: 0.72rem;
      color: #fda4af;
      background: #4c0519;
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
    }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      min-height: 0;
    }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      aside { display: none; }
    }
    .center {
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .status-panel {
      width: 100%;
      max-width: 480px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    #status { font-size: 1rem; font-weight: 600; margin: 0 0 0.25rem; }
    #detail { font-size: 0.85rem; color: var(--muted); margin: 0; min-height: 2rem; }
    .orb {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0.75rem auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: #1f2937;
    }
    .orb.live { background: var(--live); box-shadow: 0 0 32px rgba(225,29,72,0.4); animation: pulse 1s infinite; }
    .orb.on { background: var(--on); }
    @keyframes pulse { 50% { transform: scale(1.06); } }
    .meter-wrap {
      height: 6px;
      background: #0a0e14;
      border-radius: 3px;
      margin-top: 0.5rem;
      overflow: hidden;
    }
    #volumeMeter { height: 100%; width: 0%; background: var(--live); transition: width 0.05s; }
    button {
      padding: 0.65rem 1.1rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #btnConnect { background: var(--live); color: #fff; }
    #btnDisconnect { background: #374151; color: #fff; display: none; }
    #log {
      width: 100%;
      max-width: 480px;
      max-height: 160px;
      overflow-y: auto;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.75rem;
    }
    aside {
      border-left: 1px solid var(--border);
      background: var(--panel);
      padding: 0.75rem;
      overflow-y: auto;
    }
    aside h2 { font-size: 0.85rem; margin: 0 0 0.5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .resource {
      font-size: 0.82rem;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      background: #0a0e14;
    }
    .resource strong { display: block; color: #fda4af; font-size: 0.72rem; margin-bottom: 0.2rem; }
    .resource a { color: #60a5fa; word-break: break-all; }
    .empty-resources { font-size: 0.8rem; color: var(--muted); }
    .resources-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>Nila · English Live (ElevenLabs)</h1>
    <span class="badge">Full duplex · ConvAI</span>
    <input id="wsUrl" value="" placeholder="ws://localhost:8000/api/live/eleven/ws" style="width:260px" />
    <button type="button" id="btnConnect">Connect</button>
    <button type="button" id="btnDisconnect">Disconnect</button>
    <span style="font-size:0.75rem;color:var(--muted);width:100%">OpenAI realtime: <a href="/live-en" style="color:#fda4af">/live-en</a></span>
  </header>

  <main>
    <div class="center">
      <div class="status-panel">
        <p id="status">Offline</p>
        <p id="detail">After Connect, speak right away so ElevenLabs receives your mic. <a href="/api/live/eleven/status" target="_blank" style="color:#fda4af">Check status</a></p>
        <div class="meter-wrap"><div id="volumeMeter"></div></div>
        <div id="orb" class="orb">🎙️</div>
      </div>
      <div id="log"></div>
    </div>

    <aside>
      <h2>Resources <span id="resourcesMeta" class="resources-meta"></span></h2>
      <div id="resources">
        <p class="empty-resources">Forms and offices appear here when Nila searches the knowledge base.</p>
      </div>
    </aside>
  </main>

  <audio id="agentPlayer" playsinline preload="auto" style="display:none"></audio>

  <script>
    const $ = (id) => document.getElementById(id);
    const SAMPLE_RATE = 16000;
    let ws = null;
    let micStream = null;
    let audioCtx = null;
    let processor = null;
    let pendingAudio = [];
    let audioSessionReady = false;
    let agentSpeaking = false;
    let outputSampleRate = 16000;
    let outputEncoding = "pcm";
    let pcmParts = [];
    let pcmSampleCount = 0;
    let pcmFlushTimer = null;
    let wavQueue = [];
    let wavPlaying = false;

    function log(msg) {
      const p = document.createElement("p");
      p.textContent = msg;
      p.style.margin = "0.2rem 0";
      $("log").appendChild(p);
      $("log").scrollTop = $("log").scrollHeight;
    }

    function renderResources(list) {
      const box = $("resources");
      const meta = $("resourcesMeta");
      if (!list || !list.length) {
        meta.textContent = "";
        box.innerHTML = '<p class="empty-resources">No resources yet — ask about a Sri Lanka government service (forms, fees, offices).</p>';
        return;
      }
      meta.textContent = `(${list.length} from Supabase)`;
      box.innerHTML = list
        .map(
          (r) => `
        <div class="resource">
          <strong>${escapeHtml(r.label || r.type)}</strong>
          ${escapeHtml(r.name)}
          ${r.url ? `<br/><a href="${escapeAttr(r.url)}" target="_blank" rel="noopener">Open link</a>` : ""}
        </div>`
        )
        .join("");
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeAttr(s) {
      return String(s).replace(/"/g, "&quot;");
    }

    function floatTo16BitPCM(float32) {
      const buf = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        const s = Math.max(-1, Math.min(1, float32[i]));
        buf[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
      }
      return buf;
    }

    function arrayBufferToBase64(buffer) {
      let binary = "";
      const bytes = new Uint8Array(buffer);
      for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    function b64ToInt16(b64) {
      const bin = atob(b64);
      const even = bin.length - (bin.length % 2);
      const int16 = new Int16Array(even / 2);
      for (let i = 0; i < even; i += 2) {
        const lo = bin.charCodeAt(i);
        const hi = bin.charCodeAt(i + 1);
        let v = lo | (hi << 8);
        if (v & 0x8000) v -= 0x10000;
        int16[i / 2] = v;
      }
      return int16;
    }

    function buildWavBlob(samples, sampleRate) {
      const dataSize = samples.length * 2;
      const buf = new ArrayBuffer(44 + dataSize);
      const v = new DataView(buf);
      const w = (o, s) => {
        for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i));
      };
      w(0, "RIFF");
      v.setUint32(4, 36 + dataSize, true);
      w(8, "WAVE");
      w(12, "fmt ");
      v.setUint32(16, 16, true);
      v.setUint16(20, 1, true);
      v.setUint16(22, 1, true);
      v.setUint32(24, sampleRate, true);
      v.setUint32(28, sampleRate * 2, true);
      v.setUint16(32, 2, true);
      v.setUint16(34, 16, true);
      w(36, "data");
      v.setUint32(40, dataSize, true);
      let off = 44;
      for (let i = 0; i < samples.length; i++, off += 2) {
        v.setInt16(off, samples[i], true);
      }
      return new Blob([buf], { type: "audio/wav" });
    }

    function schedulePcmFlush() {
      if (pcmFlushTimer) return;
      pcmFlushTimer = setTimeout(() => {
        pcmFlushTimer = null;
        flushPcmBuffer();
      }, 120);
    }

    function takePcmWavBlob() {
      if (!pcmSampleCount) return null;
      const merged = new Int16Array(pcmSampleCount);
      let offset = 0;
      for (const part of pcmParts) {
        merged.set(part, offset);
        offset += part.length;
      }
      pcmParts = [];
      pcmSampleCount = 0;
      const minSamples = Math.floor(outputSampleRate * 0.03);
      if (merged.length < minSamples) return null;
      return buildWavBlob(merged, outputSampleRate);
    }

    function flushPcmBuffer() {
      const blob = takePcmWavBlob();
      if (blob) {
        wavQueue.push(blob);
        drainWavQueue();
      }
    }

    function enqueuePcm(b64) {
      const samples = b64ToInt16(b64);
      if (samples.length < 80) return;
      pcmParts.push(samples);
      pcmSampleCount += samples.length;
      schedulePcmFlush();
    }

    async function drainWavQueue() {
      if (wavPlaying) return;
      wavPlaying = true;
      agentSpeaking = true;
      const player = $("agentPlayer");
      try {
        while (true) {
          if (!wavQueue.length) {
            clearTimeout(pcmFlushTimer);
            pcmFlushTimer = null;
            const blob = takePcmWavBlob();
            if (blob) wavQueue.push(blob);
            if (!wavQueue.length) break;
          }
          const item = wavQueue.shift();
          let url;
          if (item && item.mpeg) {
            player.src = `data:audio/mpeg;base64,${item.mpeg}`;
          } else {
            url = URL.createObjectURL(item);
            player.src = url;
          }
          $("orb").className = "orb on";
          try {
            await player.play();
            await new Promise((resolve) => {
              const done = () => {
                player.onended = null;
                player.onerror = null;
                if (url) URL.revokeObjectURL(url);
                resolve();
              };
              player.onended = done;
              player.onerror = done;
            });
          } catch (_) {
            if (url) URL.revokeObjectURL(url);
          }
        }
      } finally {
        wavPlaying = false;
        agentSpeaking = false;
        $("orb").className = "orb live";
        if (pcmSampleCount) schedulePcmFlush();
      }
    }

    function resetPlayback() {
      clearTimeout(pcmFlushTimer);
      pcmFlushTimer = null;
      pcmParts = [];
      pcmSampleCount = 0;
      wavQueue = [];
      wavPlaying = false;
      agentSpeaking = false;
      pendingAudio = [];
      const player = $("agentPlayer");
      player.pause();
      player.removeAttribute("src");
    }

    async function flushPendingAudio() {
      const queue = pendingAudio.splice(0, pendingAudio.length);
      for (const msg of queue) queueAgentAudio(msg);
    }

    function queueAgentAudio(msg) {
      if (!audioSessionReady) {
        pendingAudio.push(msg);
        return;
      }
      const enc = (msg.encoding || outputEncoding || "pcm").toLowerCase();
      if (enc === "mpeg" || enc === "mp3") {
        wavQueue.push({ mpeg: msg.data });
        drainWavQueue();
      } else {
        enqueuePcm(msg.data);
      }
    }

    function updateMeter() {
      if (!audioCtx) return;
      const analyser = audioCtx._analyser;
      if (!analyser) return;
      const data = new Uint8Array(analyser.fftSize);
      analyser.getByteTimeDomainData(data);
      let peak = 0;
      for (let i = 0; i < data.length; i++) {
        const v = Math.abs(data[i] - 128) / 128;
        if (v > peak) peak = v;
      }
      $("volumeMeter").style.width = `${Math.min(100, peak * 400)}%`;
    }

    async function startMic() {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 },
      });
      audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
      await audioCtx.resume();
      const source = audioCtx.createMediaStreamSource(micStream);
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(analyser);
      audioCtx._analyser = analyser;
      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = (e) => {
        updateMeter();
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        if (agentSpeaking) return;
        const pcm = floatTo16BitPCM(e.inputBuffer.getChannelData(0));
        ws.send(JSON.stringify({ type: "audio", data: arrayBufferToBase64(pcm.buffer) }));
      };
      analyser.connect(processor);
      processor.connect(audioCtx.destination);
    }

    function stopMic() {
      processor?.disconnect();
      audioCtx?.close();
      micStream?.getTracks().forEach((t) => t.stop());
      processor = null;
      audioCtx = null;
      micStream = null;
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const defaultWs = `${proto}//${location.host}/api/live/eleven/ws`;
      const url = $("wsUrl").value.trim() || defaultWs;
      ws = new WebSocket(url);
      $("status").textContent = "Connecting…";

      ws.onopen = async () => {
        $("status").textContent = "Live";
        $("detail").textContent = "Speak naturally — you can interrupt Nila.";
        $("orb").className = "orb live";
        $("btnConnect").style.display = "none";
        $("btnDisconnect").style.display = "inline-block";
        renderResources([]);
        log("Connected (ElevenLabs full duplex).");
        try {
          await startMic();
        } catch (e) {
          log("Mic error: " + e.message);
        }
      };

      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "status") {
          $("detail").textContent = msg.message;
          if (msg.audio_sample_rate) outputSampleRate = msg.audio_sample_rate;
          if (msg.audio_encoding) outputEncoding = msg.audio_encoding;
          if (!audioSessionReady) {
            audioSessionReady = true;
            flushPendingAudio().catch((e) => log("Audio: " + e.message));
          }
        } else if (msg.type === "resources") {
          renderResources(msg.resources || []);
        } else if (msg.type === "rag_search") {
          const n = msg.resource_count ?? 0;
          log(
            `Supabase search: “${msg.query || ""}” → ${n} resource${n === 1 ? "" : "s"}`
          );
        } else if (msg.type === "audio") {
          if (msg.sample_rate) outputSampleRate = msg.sample_rate;
          if (msg.encoding) outputEncoding = msg.encoding;
          queueAgentAudio(msg);
        } else if (msg.type === "text") {
          const who = msg.role === "user" ? "You" : "Nila";
          log(`${who}: ${msg.text}`);
        } else if (msg.type === "error") {
          $("status").textContent = "Error";
          $("detail").textContent = msg.message;
          log("Error: " + msg.message);
        }
      };

      ws.onclose = () => disconnect(false);
    }

    function disconnect(user) {
      stopMic();
      resetPlayback();
      audioSessionReady = false;
      ws?.close();
      ws = null;
      $("status").textContent = "Offline";
      $("detail").textContent = user ? "Disconnected." : "Closed.";
      $("orb").className = "orb";
      $("btnConnect").style.display = "inline-block";
      $("btnDisconnect").style.display = "none";
      renderResources([]);
    }

    $("btnConnect").addEventListener("click", connect);
    $("btnDisconnect").addEventListener("click", () => disconnect(true));
  </script>
</body>
</html>
