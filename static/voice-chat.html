<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nila — Voice Chat</title>
  <style>
    :root {
      --bg: #070b10;
      --card: #121a24;
      --border: #243044;
      --text: #eef2f7;
      --muted: #8fa3bf;
      --accent: #22c55e;
      --accent-dim: #15803d;
      --listening: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #152238 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    h1 { font-size: 1.2rem; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.25rem; text-align: center; max-width: 420px; }
  .controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .controls input, .controls select {
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
    }
    #micBtn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #04210f;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.35);
      transition: transform 0.1s, background 0.2s;
    }
    #micBtn:hover { transform: scale(1.03); }
    #micBtn:active, #micBtn.listening {
      background: var(--listening);
      color: #fff;
      transform: scale(0.97);
    }
    #micBtn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    #status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 1.5rem;
      text-align: center;
    }
    .log {
      width: 100%;
      max-width: 520px;
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .bubble {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .bubble.you { background: #1e3a5f; align-self: flex-end; }
    .bubble.nila { background: var(--card); border: 1px solid var(--border); align-self: flex-start; }
    .bubble .label { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <h1>Nila Voice</h1>
  <p class="sub">Hold the button, speak, release — Nila listens, thinks, and speaks back. Uses Whisper + chat + ElevenLabs.</p>

  <div class="controls">
    <input id="apiBase" value="http://localhost:8000" style="width:200px" />
    <select id="language">
      <option value="auto">Auto</option>
      <option value="en">English</option>
      <option value="si">Sinhala</option>
      <option value="ta">Tamil</option>
    </select>
    <button type="button" id="btnClear" style="padding:0.4rem 0.8rem;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer">New chat</button>
  </div>

  <button type="button" id="micBtn" disabled>Hold to talk</button>
  <p id="status">Allow microphone access…</p>

  <div class="log" id="log"></div>

  <audio id="replyAudio" style="display:none"></audio>

  <script>
    const $ = (id) => document.getElementById(id);
    let history = [];
    let sessionId = null;
    let mediaRecorder = null;
    let chunks = [];
    let stream = null;
    let busy = false;

    function api() { return $("apiBase").value.replace(/\/$/, ""); }

    function setStatus(t) { $("status").textContent = t; }

    function addBubble(who, text) {
      const el = document.createElement("div");
      el.className = `bubble ${who}`;
      el.innerHTML = `<div class="label">${who === "you" ? "You" : "Nila"}</div><div>${escape(text)}</div>`;
      $("log").appendChild(el);
      el.scrollIntoView({ behavior: "smooth" });
    }

    function escape(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function initMic() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: getMimeType() });
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) chunks.push(e.data);
        };
        mediaRecorder.onstop = () => onRecordingStop();
        $("micBtn").disabled = false;
        setStatus("Hold the button and speak");
      } catch (e) {
        setStatus("Microphone blocked: " + e.message);
      }
    }

    function getMimeType() {
      if (MediaRecorder.isTypeSupported("audio/webm")) return "audio/webm";
      if (MediaRecorder.isTypeSupported("audio/mp4")) return "audio/mp4";
      return "";
    }

    function startRecording() {
      if (busy || !mediaRecorder) return;
      chunks = [];
      mediaRecorder.start();
      $("micBtn").classList.add("listening");
      $("micBtn").textContent = "Listening…";
      setStatus("Speak now…");
    }

    function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state === "inactive") return;
      mediaRecorder.stop();
      $("micBtn").classList.remove("listening");
      $("micBtn").textContent = "Hold to talk";
    }

    async function onRecordingStop() {
      if (!chunks.length) {
        setStatus("No audio captured");
        return;
      }
      busy = true;
      $("micBtn").disabled = true;
      setStatus("Processing…");

      const blob = new Blob(chunks, { type: chunks[0].type || "audio/webm" });
      const form = new FormData();
      form.append("audio", blob, "speech.webm");
      form.append("language", $("language").value);
      form.append("history", JSON.stringify(history));
      if (sessionId) form.append("session_id", sessionId);

      try {
        const res = await fetch(`${api()}/api/voice/turn`, { method: "POST", body: form });
        const data = await res.json();

        if (!res.ok || data.error) {
          setStatus("Error: " + (data.error || res.status));
          return;
        }

        sessionId = data.session_id;
        addBubble("you", data.transcript);
        addBubble("nila", data.reply);
        history.push({ role: "user", content: data.transcript });
        history.push({ role: "assistant", content: data.reply });

        if (data.audio_base64) {
          setStatus("Nila is speaking…");
          const audio = $("replyAudio");
          audio.src = `data:audio/mpeg;base64,${data.audio_base64}`;
          audio.style.display = "block";
          await audio.play();
        }
        setStatus("Hold the button to speak again");
      } catch (e) {
        setStatus("Network error: " + e.message);
      } finally {
        busy = false;
        $("micBtn").disabled = false;
      }
    }

    $("micBtn").addEventListener("mousedown", startRecording);
    $("micBtn").addEventListener("mouseup", stopRecording);
    $("micBtn").addEventListener("mouseleave", () => {
      if ($("micBtn").classList.contains("listening")) stopRecording();
    });
    $("micBtn").addEventListener("touchstart", (e) => { e.preventDefault(); startRecording(); });
    $("micBtn").addEventListener("touchend", (e) => { e.preventDefault(); stopRecording(); });

    $("btnClear").addEventListener("click", () => {
      history = [];
      sessionId = null;
      $("log").innerHTML = "";
      setStatus("New conversation — hold to talk");
    });

    initMic();
  </script>
</body>
</html>
